# ============================================
# 核心设定模板 (Core Setting Template)
# ============================================
# 严格按照 SCHEMA.md 规范填写
# 必填字段：世界观、核心冲突、人物小传
# ============================================

# 必填：世界观背景描述（多行文本）
世界观: |
  示例世界，奇幻/科幻设定。
  在这片大陆上，魔法与科技并存...

# 可选：力量/魔法体系说明（多行文本）
魔力体系: |
  魔法分为八大元素：冰、火、土、木、光、暗...
  等级划分：初级 → 中级 → 高级 → 大师...

# 必填：主线矛盾与冲突（多行文本）
核心冲突: |
  主角与未知势力的对抗，成长与抉择。
  第一层冲突：个人生存与成长
  第二层冲突：组织/国家的对抗
  第三层冲突：世界命运的抉择

# 必填：角色设定（字典结构）
人物小传:
  主角A:
    角色类型: 主角
    身份: 18岁，流浪法师
    性格: 坚韧、好奇心强、有正义感
    核心动机: 寻找失踪的导师，揭开身世之谜
    外貌: 黑发黑瞳，身材瘦削
    能力: 擅长冰系魔法，拥有罕见的双属性天赋
    背景故事: 幼时被导师收养，在边境小镇长大...

  同伴B:
    角色类型: 主要配角
    身份: 20岁，村庄护卫
    性格: 冷静、务实、忠诚
    核心动机: 保护村庄安全，为家人复仇
    外貌: 金发碧眼，体格健壮
    能力: 精通剑术，有土系魔法亲和

  导师C:
    角色类型: 次要配角
    身份: 50岁，隐居的传奇法师
    性格: 神秘、睿智、有些古怪
    核心动机: 守护古老的秘密
    背景故事: 曾是皇家首席法师，因某事隐退...

  反派D:
    角色类型: 反派
    身份: 神秘组织首领
    性格: 冷酷、野心勃勃、城府极深
    核心动机: 复活远古邪神，重塑世界秩序
    能力: 禁忌黑魔法，控制他人心智

# 可选：伏笔清单（字符串列表）
伏笔清单:
  - "主角脖子上的神秘印记"
  - "导师失踪前留下的加密日记"
  - "反派口中提到的'那个人'"
  - "主角偶尔闪现的陌生记忆"

# 可选：写作禁忌事项（字符串列表）
设定禁忌:
  - "不得直接泄露未来关键剧情"
  - "不得破坏角色已确立的动机与能力边界"
  - "主角不得轻易获得超出设定范围的力量"

# 可选：风格相关约束（字典结构）
风格约束:
  语言风格: 克制、细腻，注重节奏控制
  对话特征: 有信息量，推动剧情，避免废话
  场景描写: 聚焦关键细节与氛围营造
  节奏控制: 张弛有度，高潮与过渡交替