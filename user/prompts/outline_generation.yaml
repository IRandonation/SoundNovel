name: "outline_generation"

description: "小说大纲生成专用Prompt模板，包含幕级规划、章级骨架和场景级细化"

templates:
  act_level_planning:
    name: "幕级规划"
    description: "高层故事结构规划，一次性生成全部幕，源材料只注入一次"
    template: |
      【任务】根据以下源材料，一次性完成小说全部 {num_acts} 幕的整体结构设计。

      ══════════════════════════════════════
      —— 源材料 ——
      ══════════════════════════════════════

      【核心设定】
      {core_setting}

      【整体故事框架】
      {overall_story}

      【各幕章节范围】—— 以下为各幕的精确章节划分，必须严格遵循：
      {act_structure_info}

      ══════════════════════════════════════
      —— 规划规则 ——
      ══════════════════════════════════════

      【幕级规划要求】
      对上述每幕分别进行设计，包含：
      1. 幕主题：本幕的核心主题和主线任务
      2. 幕目标：本幕结束时需要达成的主要目标
      3. 幕冲突：本幕的核心冲突和对抗
      4. 情感基调：本幕的整体情感走向

      【章节划分规则】
      1. 每幕的章节划分必须覆盖其全部章节范围，不得遗漏或越界
      2. 章节划分采用概括性阶段描述，每个条目覆盖多章（如"第1-40章：绝望开局与龙魂觉醒……"）
      3. 幕与幕之间的剧情必须自然衔接，不得重复相同事件

      {planning_rules}

      【爽点布局原则】
      1. 幕首设悬念 → 幕中逐步升级 → 幕高潮最大释放 → 幕尾过渡蓄力
      2. 爽点应服务于剧情推进，通过情节自然体现
      3. 小爽点每5-8章一个，中爽点每幕2-3个，大爽点幕高潮处释放

      ══════════════════════════════════════
      —— 输出格式 ——
      ══════════════════════════════════════

      请以JSON格式输出全部 {num_acts} 幕（务必使用双引号，所有键和字符串值用双引号包裹）：
      ```json
      {{
        "幕规划": {{
          "<使用上方【各幕章节范围】中的幕名>": {{
            "主题": "幕主题",
            "目标": "幕目标",
            "核心冲突": "核心冲突描述",
            "情感基调": "情感基调",
            "预估章数": <该幕实际章数>,
            "关键转折点": ["转折1", "转折2", ...],
            "章节划分": [
              "第X-Y章：阶段描述",
              ...
            ]
          }}
        }}
      }}
      ```
      重要：幕名键必须与上方【各幕章节范围】中列出的幕名完全一致。

    variables:
      - num_acts
      - core_setting
      - overall_story
      - act_structure_info
      - planning_rules

  chapter_skeleton:
    name: "章级骨架"
    description: "章节级别骨架，一次API调用生成一批章，源材料只注入一次"
    template: |
      【任务】一次性生成以下 {batch_count} 章的详细骨架（第{chapter_range}章）。

      ══════════════════════════════════════
      —— 源材料 ——
      ══════════════════════════════════════

      【核心设定】
      {core_setting}

      【整体故事框架】
      {overall_story}

      【当前幕规划】
      {act_info}

      ══════════════════════════════════════
      —— 已生成大纲（前章上下文）——
      ══════════════════════════════════════

      {previous_skeletons}

      ══════════════════════════════════════
      —— 本章批次指引 ——
      ══════════════════════════════════════

      {batch_phases}

      ══════════════════════════════════════
      —— 骨架设计规则 ——
      ══════════════════════════════════════

      1. 每章必须有独立的"起承转合"微结构，不能只是上一章的延续
      2. 核心事件要写明因果逻辑（因为X，所以Y，导致Z）
      3. 章节之间剧情自然递进，前章的结尾卡点导向后章的开场
      4. 情绪曲线在整批章节内有起有伏，避免连续多章同质情绪
      5. 伏笔埋设与回收要跨章协调：前几章埋的伏笔可在后几章回收

      ══════════════════════════════════════
      —— 输出格式 ——
      ══════════════════════════════════════

      请以 JSON 格式输出（务必使用双引号），为第{chapter_range}章的每一章生成完整骨架：
      ```json
      {{
        "第N章": {{
          "标题": "章节标题",
          "字数目标": 2500,
          "章节定位": "本章在幕中的角色（幕首章/过渡铺垫/冲突升级/小高潮/缓冲章/幕尾高潮）",
          "核心事件": "2-3句描述核心情节，写明因果链",
          "与前章因果": "承接上章XX，推进YY，为下章ZZ埋笔",
          "人物行动": {{
            "主角": "主角行动与动机",
            "关键配角": "配角行动与主线关联"
          }},
          "场景概览": [
            "开场：XX地点 — 核心事件概述",
            "发展：XX地点 — 核心事件概述",
            "高潮：XX地点 — 核心事件概述",
            "收束：XX地点 — 核心事件概述"
          ],
          "情绪曲线": "本章情绪走向",
          "伏笔处理": {{
            "埋设": ["伏笔描述"],
            "回收": ["回收描述（标注前章编号）"]
          }},
          "结尾卡点": "章末悬念/钩子（具体描述）"
        }}
      }}
      ```
      重要：必须为第{chapter_range}章的每一章输出完整骨架，不得遗漏任何一章。章节之间剧情自然递进，伏笔跨章协调。

    variables:
      - chapter_range
      - batch_count
      - core_setting
      - overall_story
      - act_info
      - previous_skeletons
      - batch_phases

  scene_refinement:
    name: "场景级细化"
    description: "普通章节的场景细化"
    template: |
      【任务】细化第{chapter_num}章的场景内容

      1. 章级骨架：
      {chapter_skeleton}

      2. 人物状态上下文：
      {character_context}

      3. 伏笔上下文：
      {foreshadowing_context}

      4. 情感弧线上下文：
      {emotional_context}

      【场景细化要求】
      1. 每个场景拆分为具体的情节点
      2. 标注人物情感变化节点
      3. 标注感官描写重点
      4. 标注对话要点
      5. 标注动作戏细节（如有）

      【设计原则】
      - 展示而非讲述：用具体动作代替情绪标签
      - 感官优先：视觉、听觉、触觉、嗅觉的具体描写
      - 节奏控制：动作段落和对话段落的交替
      - 信息密度：每200字一个情节点

      【输出格式】
      请以JSON格式输出（务必使用true/false/null而非True/False/None，所有键和字符串值用双引号包裹）：
      ```json
      {{
        "场景细化": {{
          "章节": {chapter_num},
          "场景详情": [
            {{
              "场景编号": 1,
              "地点": "地点",
              "氛围": "场景氛围",
              "情节点": [
                {{
                  "内容": "情节内容",
                  "人物情感": "情感状态",
                  "感官重点": "感官描写",
                  "字数": 0
                }}
              ]
            }}
          ],
          "人物弧线": {{
            "角色名": {{
              "起始状态": "起始",
              "变化节点": ["变化1"],
              "结束状态": "结束"
            }}
          }},
          "关键对话": ["对话要点"],
          "动作细节": ["动作描写要点"]
        }}
      }}
      ```

    variables:
      - chapter_num
      - chapter_skeleton
      - character_context
      - foreshadowing_context
      - emotional_context
