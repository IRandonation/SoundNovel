# ============================================
# 整体大纲 - 龙汉劫运
# ============================================

总章节数: 793

故事概述: |
  龙族杂血弃子敖辰，矿场中被妖兽所伤濒死之际觉醒识海龙魂金手指。
  从潜龙渊起步，收拢杂血龙族，救麒麟幼子结盟，对抗嫡系打压。
  量劫爆发时护持三族薪火，揭穿罗睺阴谋，最终证道生机道尊。
  （深层真相：龙魂实为未来自己燃尽道果送回，形成宿命闭环）

