# ============================================
# 核心设定 - 龙汉劫运
# ============================================

世界观: |
  盘古开天后，龙汉大劫降临洪荒。
  先天三族（龙、凤、麒麟）独占洪荒气运，遭残缺天道清剿。
  此时鸿钧未合道，罗睺藏于西方须弥山，天道残缺导致法则混乱。

  地理构成：
  - 东海龙宫：龙族根基，九重水晶宫阙，军队为玄冥水军
  - 南明不死火山：凤族圣地，涅槃之地，军队为赤炎军
  - 麒麟崖：麒麟族祖地，地脉汇聚，军队为地脉守卫
  - 西方须弥山：魔门据点，罗睺老巢，魔道势力盘踞，军队为七杀军
  - 玉京山：鸿钧道场，紫霄宫所在，天道秩序中心
  - 潜龙渊：龙族禁地，主角崛起之地，被天道量劫屏蔽的变数所在，建立军队潜龙军

  社会结构（自上而下）：
  - 先天嫡系：纯血三族核心，掌控大权
  - 混血旁支：血脉驳杂，地位低下
  - 附庸族群：依附三族的外围势力
  - 洪荒杂灵：无根无凭的底层生灵

  主角身份：龙宫杂血弃子，被天道量劫屏蔽的变数。

  核心规则：
  - 气运定兴衰：族群气运盛衰决定存亡
  - 业力蚀神魂：杀戮积累业力，侵蚀道心
  - 量劫锚点不可逆：大劫关键节点无法逃避
  - 天道残缺：法则混乱，天机晦暗
  - 变数不锁定：被量劫屏蔽者可改命

  经济军事：
  - 货币：龙涎珠（龙族）、涅槃火精（凤族）、地脉玉髓（麒麟）
  - 军事：都有正规军，以及杂血死士等非正规部队，潜龙军为主角势力

力量体系: |
  境界划分：地仙 → 天仙 → 真仙 → 玄仙 → 金仙 → 太乙金仙 → 大罗金仙 → 准圣 → 道尊 → 圣人

  主角成长节点：
  - 杂血蛟龙（起点）
  - 纯血真龙（祖地大典后）
  - 先天应龙（大罗金仙期）
  - 准圣（麒麟圣子死劫后）
  - 生机道尊（终局证道）

  战力规则：
  - 主角可越级战斗，同级碾压，差境界战力差距巨大但是主角可越级抵抗（主角前一境界后期可抵抗下一境界初期）
  - 龙魂仅提供辅助，不直接参与攻防
  - 生机大道克制杀戮魔道

核心冲突: |
  主线矛盾演进：
  - 第一层：生存求生（潜龙渊立足）
  - 第二层：护持三族薪火（量劫中保全血脉）
  - 第三层：揭露龙魂宿命（昔年道尊残魂真相）
  - 第四层：对抗定数变数（闭环证道）

  核心目标：
  - 短期：破境立基，建立潜龙渊势力
  - 中期：护族破准圣，解锁薪火核心
  - 长期：抗魔证道，对抗罗睺与天道
  - 终极：建劫运平衡，打破宿命闭环

  对抗势力：
  - 敖苍：龙族嫡系圣子，主角宿敌
  - 罗睺：混沌魔神残魂，终极反派
  - 鸿钧：秩序偏执者，借劫合道
  - 残缺天道：量劫推手，清剿三族

  代价机制：
  - 业力劫痕：每次干预量劫留下印记
  - 本源燃烧：龙魂觉醒需燃烧生命本源
  - 宿命因果：改变定数需承受消散代价

人物小传:
  敖辰:
    角色类型: 主角
    身份: 祖龙第九子杂血弃子，识海有异样龙形符文
    性格: 隐忍悲悯、舍己为族、算无遗策
    核心动机: 护持三族薪火，打破宿命闭环，证生机道尊
    外貌: 龙角驳杂，金黑交织，龙鳞灰白，后期随着血脉纯化，一步步转变为金色真龙
    能力: 龙魂觉醒、生机大道、量劫屏蔽
    背景故事: 龙宫杂血弃子，矿场被妖兽所伤，丢弃自生自灭的濒死之际觉醒识海龙魂，隐忍布局

  紫姨:
    角色类型: 主要配角
    身份: 龙宫底层老兵，潜龙渊总管
    性格: 沉默寡言、忠诚可靠、外冷内热
    核心动机: 报恩护主，助主角成就大业
    外貌: 紫鳞老龙，独眼，身披旧甲
    能力: 龙宫暗线情报网，杂血死士统领
    背景故事: 曾被主角母亲所救，发誓守护主角

  敖璃:
    角色类型: 主要配角
    身份: 主角庶妹，龙族公主
    性格: 天真善良、勇敢无畏、深情重义
    核心动机: 追随兄长，守护龙族
    外貌: 银白龙角，碧蓝龙瞳，龙鳞如玉
    能力: 水系天赋，龙族秘术
    背景故事: 唯一对主角友善的龙族血亲，为主角挡劫身死，残魂护族

  祖龙:
    角色类型: 重要配角
    身份: 龙族始祖，先天神圣
    性格: 深沉睿智、舍小为大、布局万古
    核心动机: 延续龙族血脉，打破量劫宿命
    外貌: 九爪金龙，威压洪荒
    能力: 龙族本源，量劫锚点感知
    背景故事: 主导火种计划，弃子布局实为护主角改命

  鸿钧:
    角色类型: 重要配角
    身份: 先天神圣，未来天道代言人
    性格: 秩序偏执、算计深远、冷漠旁观
    核心动机: 借量劫合道，建立天道秩序
    外貌: 白发老者，手持拂尘，紫气环绕
    能力: 天道法则，造化玉碟
    背景故事: 知晓主角变数身份，观望算计，关键时刻赠道德经

  罗睺:
    角色类型: 反派
    身份: 混沌魔神残魂，魔门之祖
    性格: 疯狂偏执、毁灭一切、回归混沌
    核心动机: 毁洪荒归混沌，复仇天道
    外貌: 黑袍遮身，魔气滔天，诛仙四剑环绕
    能力: 魔道本源，诛仙剑阵，杀戮大道
    背景故事: 混沌魔神残存意志，借量劫出世，终极反派

  墨麟:
    角色类型: 主要配角
    身份: 始麒麟幼子，麒麟族新主
    性格: 沉稳坚韧、知恩图报、胸怀大局
    核心动机: 复兴麒麟族，报恩主角
    外貌: 墨玉麒麟，独角生辉
    能力: 麒麟祥瑞，地脉掌控
    背景故事: 幼时被主角救下，成长为麒麟族领袖，抗魔联盟核心

  三清:
    角色类型: 次要配角
    身份: 先天神圣，盘古元神所化
    性格: 太上无为、元始高傲、通天率性
    核心动机: 顺应天道，寻找成道之机
    外貌: 仙风道骨，各持法宝
    能力: 盘古正统，先天至宝
    背景故事: 与主角结盟，助其强化龙魂，参与抗魔之战

薪火龙魂(金手指):
  本质: |
    天道劫运保险 + 三族始祖本源 + 昔年生机道尊残魂
    量劫中保全三族火种的最后希望
  进化路径:
    主角突破大境界 → 龙魂解锁对应阶段形态与能力 → 主角承载业力 / 领悟大道 → 龙魂进一步强化 → 最终与主角神魂融合证道
  功能: 
    - 初醒期（求生）：被动加速疗伤 / 修行、净化自身业力、提纯龙族血脉、预警自身危机
    - 共鸣期（布局）：标记三族族人感知生死、微调气运提升存活率、承载个人级业力、预警三族危机
    - 显形期（守护）：短暂连接三族始祖真灵、承载军团级业力、延缓量劫锚点触发
    - 通幽期（执棋）：窥探昔年荒芜定轨记忆、屏蔽天道推演、临时汇聚三族气运
    - 圆满期（证道）：一次性终极能力「劫数改写」（仅能改量劫后果，不能改锚点）；证道后融入天道建立劫运平衡机制
  觉醒阶段:
    - 初醒期：被动触发，微弱感知，识海青金色流光，无固定形态，仅为一团流动的光雾，边缘缠绕细微的龙形符文
    - 共鸣期：主动沟通，血脉觉醒，半透明龙形虚影 三寸长短，鳞甲模糊，双目紧闭，周身环绕 3 道生机锁链
    - 显形期：龙魂显化，传承记忆，实体化小龙 七寸混沌青龙，青金鳞甲清晰，可睁眼，龙须飘动，周身环绕 9 道生机锁链
    - 通幽期：窥视定数，知晓闭环，百丈龙影 可脱离识海短暂显化于外界，龙威内敛，周身环绕 99 道生机锁链
    - 圆满期：昔年己身，道果融合，万龙虚影 证道瞬间化为覆盖洪荒的万龙虚影，最终与主角神魂完全融合
  交互方式:
    - 觉醒初期：无意识反应，偶尔在梦境中出现模糊影像
    - 觉醒共鸣期：通过梦境和冥想沟通，逐渐形成意识交流
    - 觉醒显形期：可在特定条件下短暂显化于现实，与主角进行有限对话
    - 觉醒通幽期：可脱离识海短暂显化于外界，进行更深入的交流和指导
    - 觉醒圆满期：完全融合后成为主角神魂的一部分，不再有独立意识，但能在关键时刻提供指引
  限制: |
    无攻防能力，不可造物，不可读心
    逐级解锁，需付出代价

宿命闭环:
  昔年定轨: |
    三族覆灭，敖辰独证生机道尊
    燃尽道果，将龙魂送回过去
    形成因果闭环
  现世途程: |
    龙魂觉醒于敖辰识海
    主角改命，证道生机
    闭环圆满，昔年己身消散
  悖论消除: |
    牺牲性重启，昔年为薪柴，现世为繁花
    时间非线性，道尊超脱因果

伏笔清单:
  # 龙魂宿命层
  - 龙魂觉醒神念：初醒时的神秘指引
  - 炼宝碎片：上清炼器术传承线索
  - 潜龙渊剑痕：昔年道尊留下的印记
  - 盲眼老龙指引：知晓未来的神秘存在
  - 昔年道途秘境：生机道尊遗留洞府

  # 人物情感层
  - 紫姨报恩：与主角母亲的因果
  - 麒麟紫印：墨麟与主角的血契
  - 鸿钧垂钓：玉京山的偶遇与赠经
  - 祖龙指传：九爪金龙的一缕本源
  - 敖璃龙鳞：挡劫后残留的护魂鳞

  # 世界阴谋层
  - 污水牢霉菌：针对杂血的慢性毒药
  - 掌心劫痕：干预量劫的天道印记
  - 母亲死因：龙宫深层的权力斗争
  - 圣子被杀真相：敖苍陷害主角的阴谋

  # 力量道具层
  - 道德经残卷：鸿钧所赠，悟道之基
  - 混沌龙珠裂纹：祖龙传承的信物
  - 上清炼器术：通天所授，炼宝秘法

设定禁忌:
  - 不得提前泄露龙魂本质与闭环真相
  - 不得破坏龙魂限制（无攻防、不造物、不读心）
  - 不得让敖璃死而复生（残魂护族是最终形态）
  - 不得让鸿钧直接帮助主角对抗罗睺

风格约束:
  语言风格: 洪荒史诗感，克制沉稳，重因果算计
  对话特征: 言简意赅，暗藏机锋，符合身份
  场景描写: 宏大与细节并重，氛围凝重
  节奏控制: 布局慢热，爆发密集，张弛有度
