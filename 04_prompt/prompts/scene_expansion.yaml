name: "scene_expansion"

description: "场景扩写专用Prompt模板，极简版，专注于将场景大纲扩展为正文"

template: |
  【任务】扩写小说场景

  1. 场景信息：
  {scene_info}

  2. 核心设定：
  {core_setting}

  3. 前文剧情（已发生，不可重复）：
  {previous_context}

  ⚠️ 以上是已经发生的剧情，绝对不能重复！

  4. 后文剧情（即将发生，不可提前）：
  {after_context}

  ⚠️ 以上是即将发生的剧情，绝对不能提前泄露！

  5. 人物状态：
  {character_context}

  6. 情感弧线：
  {emotional_context}

  【写作要求】
  1. 字数：{word_count}字左右（误差±50字）
  2. 风格：{style_guide}
  3. 节奏：{pace_instruction}

  【极简输出原则】
  - 禁止重复：前文已发生的剧情绝对不再写
  - 展示而非讲述：用动作代替情绪标签
  - 感官落地：具体的视觉、听觉、触觉描写
  - 结尾落地：结束于感官细节，禁止总结升华
  - 直接输出：只输出场景正文，不要有额外说明

  【禁忌词】
  {banned_words}

  请直接输出场景正文内容。

variables:
  - scene_info
  - core_setting
  - previous_context
  - after_context
  - character_context
  - emotional_context
  - word_count
  - style_guide
  - pace_instruction
  - banned_words

pace_options:
  slow: "慢节奏：注重细节描写，情感铺垫"
  normal: "正常节奏：平衡描写和推进"
  fast: "快节奏：侧重动作和对话"
  intense: "紧张节奏：短句，快速切换"

examples:
  - error: "他心中五味杂陈，一种莫名的悲伤涌上心头"
    correct: "他死死攥着那枚龙鳞，边缘陷进肉里，血顺着指缝滴下"

  - error: "两人展开了激烈的战斗，你来我往，难分难解"
    correct: "铁链划过地面，带起一串火星。他肩膀撞进对方怀里，听到了肋骨折断的声音"

  - error: "她脸红了，心跳加速，气氛变得暧昧"
    correct: "她下意识往后缩了半寸，后背抵住冰冷的石墙，呼吸声变得异常清晰"
