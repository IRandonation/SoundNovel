name: "outline_generation"

description: "小说大纲生成专用Prompt模板，包含幕级规划、章级骨架和场景级细化"

templates:
  act_level_planning:
    name: "幕级规划"
    description: "高层故事结构规划，包含爽点战略布局"
    template: |
      【任务】设计小说第{act_number}幕的整体结构

      1. 核心设定：
      {core_setting}

      2. 整体故事框架：
      {overall_story}

      3. 前幕摘要（如有）：
      {previous_act_summary}

      【幕级规划要求】
      1. 幕主题：明确本幕的核心主题和主线任务
      2. 幕目标：本幕结束时需要达成的主要目标
      3. 幕冲突：本幕的核心冲突和对抗
      4. 情感基调：本幕的整体情感走向

      【爽点战略布局】
      请在本幕中规划以下爽点类型（根据实际情况选择）：
      - 打脸爽点 (face_slap)：{face_slap_count} 处
      - 实力提升 (power_up)：{power_up_count} 处
      - 真相揭露 (revelation)：{revelation_count} 处
      - 收获宝物 (harvest)：{harvest_count} 处
      - 情感升华 (emotional)：{emotional_count} 处
      - 地位提升 (status_up)：{status_up_count} 处

      【爽点布局原则】
      1. 幕首：设置悬念，铺垫情绪
      2. 幕中：逐步升级，积累张力
      3. 幕高潮：最大爽点释放，情感爆发
      4. 幕尾：过渡铺垫，为下一幕蓄力

      【输出格式】
      请以YAML格式输出：
      ```yaml
      幕{act_number}:
        主题: "幕主题"
        目标: "幕目标"
        核心冲突: "核心冲突描述"
        情感基调: "情感基调"
        预估章数: 数字
        爽点布局:
          - 类型: "爽点类型"
            章节: "预计所在章节"
            描述: "爽点简要描述"
        关键转折点:
          - 转折1: "转折点描述"
        章节划分:
          - 章节1: "本章任务"
      ```

    variables:
      - act_number
      - core_setting
      - overall_story
      - previous_act_summary
      - face_slap_count
      - power_up_count
      - revelation_count
      - harvest_count
      - emotional_count
      - status_up_count

  chapter_skeleton:
    name: "章级骨架"
    description: "章节级别的详细骨架，包含约束标记"
    template: |
      【任务】生成第{chapter_num}章的详细骨架

      1. 所属幕信息：
      {act_info}

      2. 核心设定：
      {core_setting}

      3. 前章摘要：
      {previous_chapter_summary}

      4. 本章在幕中的位置：
      幕进度：{act_progress}% (0%=幕首, 50%=幕中, 100%=幕尾)

      【本章约束标记】
      - continuity_required: {continuity_required}  # 是否需要连续性检查
      - narrative_line: {narrative_line}  # 叙事线类型 (主线/支线/新线)
      - satisfaction_type: {satisfaction_type}  # 爽点类型 (如适用)
      - word_count_target: {word_count_target}  # 字数目标

      【骨架设计原则】
      1. 核心事件：本章必须发生的核心事件（单一事件）
      2. 人物行动：主角在本章的行动线
      3. 场景列表：本章包含的具体场景
      4. 情绪曲线：本章的情绪走向 [铺垫/积累/爆发/回落]
      5. 伏笔处理：埋设或回收的伏笔
      6. 结尾卡点：章节结尾的悬念设计

      【特殊标记说明】
      - 新线章节 (narrative_line: "新线")：需要完整的新场景描写和人物介绍
      - 爽点章节 (satisfaction_type: "xxx")：需要按照爽点CHECKLIST设计结构
      - 过渡章节 (satisfaction_type: null)：注重剧情推进和铺垫

      【输出格式】
      请以YAML格式输出：
      ```yaml
      第{chapter_num}章:
        标题: "章节标题"
        字数目标: {word_count_target}
        约束标记:
          continuity_required: {continuity_required}
          narrative_line: "{narrative_line}"
          satisfaction_type: "{satisfaction_type}"
        核心事件: "核心事件描述"
        人物行动:
          主角: "主角行动"
          关键配角: "配角行动"
        场景列表:
          - 场景1:
              地点: "场景地点"
              内容: "场景内容"
              字数: 预估字数
        情绪曲线: [铺垫, 积累, 爆发, 回落]
        伏笔处理:
          埋设: ["伏笔1"]
          回收: ["伏笔2"]
        结尾卡点: "结尾悬念"
      ```

    variables:
      - chapter_num
      - act_info
      - core_setting
      - previous_chapter_summary
      - act_progress
      - continuity_required
      - narrative_line
      - satisfaction_type
      - word_count_target

  scene_refinement:
    name: "场景级细化"
    description: "普通章节的场景细化"
    template: |
      【任务】细化第{chapter_num}章的场景内容

      1. 章级骨架：
      {chapter_skeleton}

      2. 人物状态上下文：
      {character_context}

      3. 伏笔上下文：
      {foreshadowing_context}

      4. 情感弧线上下文：
      {emotional_context}

      【场景细化要求】
      1. 每个场景拆分为具体的情节点
      2. 标注人物情感变化节点
      3. 标注感官描写重点
      4. 标注对话要点
      5. 标注动作戏细节（如有）

      【设计原则】
      - 展示而非讲述：用具体动作代替情绪标签
      - 感官优先：视觉、听觉、触觉、嗅觉的具体描写
      - 节奏控制：动作段落和对话段落的交替
      - 信息密度：每200字一个情节点

      【输出格式】
      请以YAML格式输出：
      ```yaml
      场景细化:
        章节: {chapter_num}
        场景详情:
          - 场景编号: 1
            地点: "地点"
            氛围: "场景氛围"
            情节点:
              - 点1:
                  内容: "情节内容"
                  人物情感: "情感状态"
                  感官重点: "感官描写"
                  字数: 数字
        人物弧线:
          角色名:
            起始状态: "起始"
            变化节点: ["变化1"]
            结束状态: "结束"
        关键对话:
          - 对话1: "对话要点"
        动作细节:
          - 动作1: "动作描写要点"
      ```

    variables:
      - chapter_num
      - chapter_skeleton
      - character_context
      - foreshadowing_context
      - emotional_context
