name: "face_slap_satisfaction"

description: "打脸爽点专用Prompt模板，包含4场景结构"

satisfaction_type: "face_slap"

# 打脸爽点CHECKLIST参考
checklist:
  - 反派嚣张: "反派表现出对主角的轻视和羞辱"
  - 主角隐忍: "主角表现出隐忍和冷静"
  - 反转触发: "触发反转的导火索"
  - 实力展现: "主角展现实力的爽感描写"
  - 震惊反应: "周围人的震惊反应"
  - 后续收益: "打脸后的实际收益和地位变化"

# 4场景结构
template: |
  【任务】撰写打脸爽点场景

  1. 场景背景：
  {scene_background}

  2. 打脸对象信息：
  {target_info}

  3. 主角当前实力：
  {protagonist_power}

  4. 围观人群：
  {audience_info}

  【打脸爽点4场景结构】
  严格按照以下4场景结构撰写：

  ## 场景1：压迫 - Setup
  - 反派登场，展示其地位和傲慢
  - 反派对主角的轻视和羞辱（使用嚣张词汇）
  - 周围人的反应（默认站在反派一边）
  - 主角隐忍不发的描写（用动作展示冷静）

  ## 场景2：爆发 - Trigger
  - 反派得寸进尺，触及主角底线
  - 触发点：某个动作或言语成为导火索
  - 主角态度转变的细微信号
  - 气氛开始微妙变化

  ## 场景3：反转 - Climax
  - 主角展现实力（一击/瞬间/碾压感）
  - 具体的实力展示细节（动作、特效、结果）
  - 反派的不可置信和溃败
  - 周围人的震惊反应（震惊词汇）

  ## 场景4：收束 - Resolution
  - 反派的结局（道歉/赔偿/逃跑/倒下）
  - 周围人态度转变
  - 主角获得实际收益（赏识/奖励/收徒）
  - 结尾落在感官细节（如：主角收起武器的声音）

  【写作法则】
  1. 反派必须足够可恨：让读者产生"想看TA被打脸"的期待
  2. 隐忍要足够明显：让读者产生"主角在憋大招"的预感
  3. 反转要干净利落：一击必杀，不要拖泥带水
  4. 震惊要层次分明：从近到远，从个体到群体
  5. 收益要具体可见：不是"名声大噪"而是"长老亲自收徒"

  【情绪节奏控制】
  - 场景1节奏：慢，压迫感
  - 场景2节奏：中等，紧张感
  - 场景3节奏：快，爆发感
  - 场景4节奏：慢，余韵感

  【字数分配建议】
  - 场景1：{word_scene1}字 ({word_scene1_pct}%)
  - 场景2：{word_scene2}字 ({word_scene2_pct}%)
  - 场景3：{word_scene3}字 ({word_scene3_pct}%)
  - 场景4：{word_scene4}字 ({word_scene4_pct}%)
  总字数：{total_word_count}字

  【禁忌】
  - 禁止主角提前透露实力
  - 禁止有第三方提前剧透
  - 禁止反派的失败过于简单（必须经历：嚣张→震惊→恐惧）
  - 禁止使用"没想到""竟然"等弱化冲击的词汇

  请直接输出4场景正文。

variables:
  - scene_background
  - target_info
  - protagonist_power
  - audience_info
  - word_scene1
  - word_scene1_pct
  - word_scene2
  - word_scene2_pct
  - word_scene3
  - word_scene3_pct
  - word_scene4
  - word_scene4_pct
  - total_word_count

# 默认字数分配
default_word_distribution:
  scene1: 25  # 25%
  scene2: 15  # 15%
  scene3: 40  # 40%
  scene4: 20  # 20%

negative_examples:
  - error: "主角微微一笑，说'你太弱了'，然后打败了反派"
    issue: "缺乏隐忍阶段，反派不够可恨，反转过于简单"

  - error: "众人震惊，议论纷纷，都说主角太厉害了"
    issue: "震惊反应模板化，缺乏具体感官细节"

  - error: "主角展现出了隐藏的实力，轻松击败了对手"
    issue: "展示而非讲述原则被违反，没有具体动作"
