# 状态卡生成提示词
# 用于提取章节结尾状态，供下一章参考

name: "state_card"
description: "提取章节结尾状态，确保下一章剧情连续性"

purpose: |
  状态卡是解决剧情重复问题的关键机制：
  1. 记录本章结尾的所有角色状态
  2. 记录当前位置和场景
  3. 记录未完成的剧情线
  4. 为下一章提供明确的起始点
  
  下一章生成时，状态卡内容会作为"前文剧情摘要"注入，
  让AI明确知道哪些内容已经发生过，不能重复。

output_fields:
  - name: "人物状态"
    type: "list"
    description: "每个角色在章节结尾的状态"
    example: ["敖辰: 重伤恢复中，获得赤鳞战甲，正向出口移动"]
    
  - name: "当前位置"
    type: "list"
    description: "场景位置描述"
    example: ["污水牢 -> 乱流海岩道"]
    
  - name: "情感基调"
    type: "str"
    description: "章节结尾的情感"
    example: "紧张、求生、希望"
    
  - name: "未完成事件"
    type: "list"
    description: "待续的剧情线"
    example: ["逃离龙宫", "躲避敖烈父亲的追杀"]
    
  - name: "下章建议"
    type: "str"
    description: "对下一章开头的建议"
    example: "本章结尾在岩道中，下章应从乱流海开始"

template: |
  分析以下小说章节的结尾状态，提取关键信息供下一章使用。
  
  【章节内容】
  {content}
  
  【前文状态】
  {previous_context}
  
  请按以下JSON格式输出章节结尾状态：
  {{
    "人物状态": ["角色名: 当前状态描述"],
    "当前位置": ["场景位置"],
    "情感基调": "本章结尾的情感",
    "未完成事件": ["待续的剧情线"],
    "下章建议": "对下一章开头的建议"
  }}
  
  重要提示：
  1. 人物状态要详细记录：位置、身体、心理、物品
  2. 当前位置要明确：场景名称和特征
  3. 未完成事件是下一章要继续的剧情
  4. 下章建议要具体：从哪里开始，不能重复什么

variables:
  - name: "content"
    type: "str"
    description: "本章完整内容"
  - name: "previous_context"
    type: "str"
    description: "前文状态卡"