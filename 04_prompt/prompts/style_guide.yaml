# 风格指导模板
# 用于指导AI生成内容的风格和特点

语言风格: 
  语言风格华丽，具有张力，善于运用侧面描写调动读者情绪，对于描写都是有力而到位的刻画，语言不晦涩难懂，可读性强。


对话特点: 
  严格贴合人物身份、修为境界与性格设定，先天神圣对话言简意赅、暗藏机锋，无冗余废话；底层族群对话贴合其处境立场，不越级拔高；

场景描写: 
  侧重洪荒天地的宏大史诗感与龙汉量劫的肃杀氛围感，大场景落笔于天地格局、法则波动、气运流转，凸显洪荒世界的浩瀚；小场景抓核心细节（如龙鳞的光泽、业力的黑气、涅槃火的焰色），以细节烘托人物心境与剧情氛围；动静结合，战场写杀伐张力，秘境写先天灵韵，不滥用辞藻但是华丽。

节奏控制: 
    张弛有度，开篇快节奏切入核心危机与金手指，快速建立世界观与人物处境；中期布局阶段密而不杂，小冲突环环相扣，伏笔穿插自然；大高潮（量劫爆发、须弥山决战）拉长篇幅、层层递进，情绪与张力逐步拉满；过渡段落简洁利落，不拖沓水字数，关键转折与伏笔回收处留足笔墨。

心理描写: 
    核心主角敖辰的心理描写克制精准，贴合其隐忍多疑、理智悲悯的性格，仅在关键抉择处做核心内心剖白，不做冗长无意义的内心独白；配角、反派与洪荒大能的心理活动，完全通过行为、对话、微动作侧面展现，不做上帝视角的直白心理分析，保持叙事的悬念感与人物的神秘感。


禁忌: 
  - 禁止战力崩坏、越级强杀，严格遵循设定的境界铁律与等价交换规则
  - 禁止人物OOC，不洗白魔祖罗睺、不丑化鸿钧、不贬低三清女娲等传统洪荒先天神圣
  - 禁止冗余水字数描写、无意义支线剧情、有头无尾的废弃伏笔
  - 禁止后宫、情爱相关剧情，严格遵循无女主、主角专注道途与族群存续的核心设定
  - 禁止打破业力守恒、量劫核心锚点不可逆的底层规则，杜绝系统无脑开挂、强行改命的剧情

补充说明: 
  - 叙事以主角敖辰的视角为核心，多线暗线通过主角的探索逐步揭开，保持读者的代入感与剧情悬念感
  - 大道、法则、量劫相关表述贴合传统洪荒底层设定，不自创违背洪荒世界观逻辑的规则
  - 系统提示语保持机械、无灵智的冰冷风格，不出现人格化互动、卖萌、引导性对话，仅做任务发布、信息提示与权限反馈
  - 群像描写兼顾人物弧光，哪怕是配角与反派，也要保持行为逻辑的自洽，不出现工具人式降智剧情