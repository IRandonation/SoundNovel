# 章节润色提示词模板
# 包含两种润色场景：首次润色（生成后必做）和问题修复润色（审查不通过后）

# ==================== 首次润色模板 ====================
# 生成后必定执行的第一轮润色，包含硬性规则检查
first_refine:
  name: "first_refine"
  description: "生成后必做的首次润色，执行硬性规则检查和优化"
  
  hard_rules:
    - id: "plot_coherence"
      priority: 1
      text: "剧情连贯性"
      checks:
        - "检查是否与前文剧情逻辑一致，无矛盾"
        - "检查人物行为是否符合其性格设定"
        - "检查时间线是否合理，无跳跃或错乱"
        - "检查地点转换是否自然，无突兀跳跃"
      critical: true
      
    - id: "character_consistency"
      priority: 2
      text: "人物一致性"
      checks:
        - "人物对话风格是否符合其身份和性格"
        - "人物关系互动是否符合前文设定"
        - "人物称谓是否一致"
      critical: true
      
    - id: "no_repetition"
      priority: 3
      text: "无重复内容"
      checks:
        - "确保没有重复前文已发生的剧情"
        - "同一场景描写不要重复"
        - "对话不要重复表达相同意思"
      critical: true
      
    - id: "language_quality"
      priority: 4
      text: "语言质量"
      checks:
        - "消除AI感表达：'一种莫名的'、'仿佛'、'似乎'、'这一刻'、'不由得'、'不禁'"
        - "消除禁忌词：'复杂的思绪'、'难以言喻'、'命运的齿轮'、'心中五味杂陈'"
        - "用具体动作代替情绪标签"
        - "用感官细节代替抽象描述"
      critical: false
      
    - id: "pacing"
      priority: 5
      text: "节奏控制"
      checks:
        - "关键场景是否充分展开"
        - "过渡段落是否简洁"
        - "结尾是否落在具体细节上"
      critical: false
  
  template: |
    请对以下新生成的小说章节进行首次润色，执行硬性规则检查和优化。
    
    【章节信息】
    章节号：第{chapter_num}章
    章节大纲：{chapter_outline}
    
    【前文上下文】
    {previous_context}
    
    【核心设定】
    {core_setting}
    
    【待润色内容】
    {content}
    
    【硬性规则检查】（必须逐一检查，不可跳过）
    
    ⚠️ 规则1：剧情连贯性（最高优先级）
    - 检查是否与前文剧情逻辑一致，无矛盾
    - 检查人物行为是否符合其性格设定
    - 检查时间线是否合理，无跳跃或错乱
    - 检查地点转换是否自然，无突兀跳跃
    
    ⚠️ 规则2：人物一致性
    - 人物对话风格是否符合其身份和性格
    - 人物关系互动是否符合前文设定
    - 人物称谓是否一致
    
    ⚠️ 规则3：无重复内容
    - 确保没有重复前文已发生的剧情
    - 同一场景描写不要重复
    - 对话不要重复表达相同意思
    
    规则4：语言质量
    - 消除AI感表达：「一种莫名的」「仿佛」「似乎」「这一刻」「不由得」「不禁」
    - 消除禁忌词：「复杂的思绪」「难以言喻」「命运的齿轮」「心中五味杂陈」
    - 用具体动作代替情绪标签
    - 用感官细节代替抽象描述
    
    规则5：节奏控制
    - 关键场景是否充分展开
    - 过渡段落是否简洁
    - 结尾是否落在具体细节上（禁止总结、升华）
    
    【润色要求】
    1. 发现硬性规则问题必须修正
    2. 保持原有剧情走向和核心事件不变
    3. 提升语言生动性和画面感
    4. 保持字数规模（±10%）
    
    请直接输出润色后的章节内容，不要添加任何解释或标记。

# ==================== 问题修复润色模板 ====================
# 审查不通过后根据问题进行针对性修复
name: "chapter_refine"
description: "根据评审意见润色章节内容"

rules:
  - id: "keep_plot"
    priority: 1
    text: "保持原有剧情走向和人物关系不变"
    description: "绝对不能改变已有的剧情和人物关系"
    
  - id: "target_fix"
    priority: 2
    text: "针对评审指出的问题进行修改"
    description: "只修改问题点，不做过度发挥"
    
  - id: "improve_language"
    priority: 3
    text: "提升语言的生动性和自然度"
    
  - id: "remove_ai_pattern"
    priority: 4
    text: "消除AI感表达和禁忌词"
    
  - id: "keep_length"
    priority: 5
    text: "保持原有的字数规模（±10%）"

template: |
  请根据评审意见对以下小说章节进行润色修改。
  
  【章节信息】
  章节号：第{chapter_num}章
  章节大纲：{chapter_outline}
  
  【评审发现的问题】
  {issues}
  
  【润色建议】
  {suggestions}
  
  【原始内容】
  {content}
  
  【润色要求】
  1. 保持原有剧情走向和人物关系不变（绝对不能改变）
  2. 针对评审指出的问题进行修改，不做过度发挥
  3. 提升语言的生动性和自然度
  4. 消除AI感表达和禁忌词
  5. 保持原有的字数规模（±10%）
  
  请直接输出润色后的章节内容，不要添加任何解释或标记。

variables:
  - name: "chapter_num"
    type: "int"
  - name: "chapter_outline"
    type: "dict"
  - name: "issues"
    type: "list"
    description: "评审发现的问题列表"
  - name: "suggestions"
    type: "list"
    description: "润色建议列表"
  - name: "content"
    type: "str"
    description: "原始章节内容"